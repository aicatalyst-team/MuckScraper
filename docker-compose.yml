# muckscraperHeadlinesGoogleNEW/docker-compose.yml
services:
  postgres:
    image: pgvector/pgvector:pg14
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.8
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-muckscraper-dev-key}
    volumes:
      - ./meili_data:/meili_data
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: news_fetcher/Dockerfile
    depends_on:
      - postgres
      - meilisearch
    command: sh -c "sleep 15 && python -m news_fetcher.scheduler"
    environment:
      FLASK_APP: aggregator.app
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      NEWS_API_KEY: ${NEWS_API_KEY}
      GNEWS_API_KEY: ${GNEWS_API_KEY}
      OLLAMA_HOST: ${OLLAMA_HOST}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      FETCH_SCHEDULE_HOURS: ${FETCH_SCHEDULE_HOURS:-7,12,17,22}
      FULL_PIPELINE_HOURS: ${FULL_PIPELINE_HOURS:-7,17}
      OLLAMA_MAC: ${OLLAMA_MAC}
      MEILI_URL: ${MEILI_URL:-http://meilisearch:7700}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-muckscraper-dev-key}
    restart: unless-stopped
    volumes:
      - .:/app

  app:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - meilisearch
    environment:
      FLASK_APP: aggregator.app
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      NEWS_API_KEY: ${NEWS_API_KEY}
      GNEWS_API_KEY: ${GNEWS_API_KEY}
      OLLAMA_HOST: ${OLLAMA_HOST}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      OLLAMA_MAC: ${OLLAMA_MAC}
      MEILI_URL: ${MEILI_URL:-http://meilisearch:7700}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-muckscraper-dev-key}
    restart: unless-stopped
    volumes:
      - .:/app

networks:
  default:
    name: app-network
